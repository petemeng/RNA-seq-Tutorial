site_name: RNA-seq 最佳实践系列
site_description: 拟南芥轻度干旱 bulk RNA-seq 从下载到发表级图表的实战教程。
site_author: petemeng
repo_url: https://github.com/petemeng/RNA-seq-Tutorial
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: amber
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes

extra_css:
  - assets/stylesheets/extra.css

nav:
  - 首页: index.md
  - 正文:
      - 第 1 篇: series/01.md
      - 第 2 篇: series/02.md
      - 第 3 篇: series/03.md
      - 第 4 篇: series/04.md
      - 第 5 篇: series/05.md
      - 第 6 篇: series/06.md
      - 第 7 篇: series/07.md
      - 第 8 篇: series/08.md
      - 第 9 篇: series/09.md
      - 第 10 篇: series/10.md
  - 图表总览: figures.md
